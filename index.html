.theme-switch {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 62px;
  height: 34px;
  z-index: 9999;
}

.theme-switch input {
  display: none;
}

.slider {
  position: absolute;
  inset: 0;
  background: #374151;
  border-radius: 999px;
  cursor: pointer;
  transition: .3s;
}

.slider::before {
  content: "";
  position: absolute;
  width: 28px;
  height: 28px;
  left: 3px;
  top: 3px;
  background: #3b82f6;
  border-radius: 50%;
  transition: .3s;
}

.icon {
  position: absolute;
  left: 9px;
  top: 6px;
  font-size: 16px;
  transition: .3s;
}

.theme-switch input:checked + .slider {
  background: #475569;
}

.theme-switch input:checked + .slider::before {
  transform: translateX(28px);
}

.theme-switch input:checked + .slider .icon {
  transform: translateX(28px);
  content: "☀️";
}

      let currentFilter = "all",
        currentSort = "popular",
        isDarkMode = true,
        currentGrade = "2sec";

      function switchGrade(grade) {
        currentGrade = grade;
        document.querySelectorAll(".grade-btn").forEach((btn) => {
          const isActive = btn.dataset.grade === grade;
          btn.style.backgroundColor = isActive
            ? isDarkMode
              ? "#f0c040"
              : "#d97706"
            : isDarkMode
              ? "#1e293b"
              : "#e2e8f0";
          btn.style.color = isActive
            ? isDarkMode
              ? "#0f172a"
              : "#ffffff"
            : isDarkMode
              ? "#94a3b8"
              : "#64748b";
          btn.classList.toggle("active", isActive);
        });
        const gradeName = {
          "2sec": "ثانية ثانوي",
        };
        document.getElementById("main-title").textContent =
          `مكتبة ${gradeName[grade]}`;
        applySort();
      }

      function handleSearch() {
        const searchTerm = document
          .getElementById("search-input")
          .value.toLowerCase();
        let filtered =
          currentFilter === "all"
            ? books.filter((b) => b.grade === currentGrade)
            : books.filter(
                (b) => b.cat === currentFilter && b.grade === currentGrade,
              );
        filtered = filtered.filter(
          (b) =>
            b.title.includes(searchTerm) ||
            b.desc.includes(searchTerm) ||
            b.cat.includes(searchTerm),
        );
        applyCurrentSort(filtered);
      }

      function sortBooks(type) {
        currentSort = type;
        updateSortButtons();
        applySort();
      }

      function updateSortButtons() {
        document.querySelectorAll(".sort-badge").forEach((btn) => {
          const isActive = btn.dataset.sort === currentSort;
          btn.style.backgroundColor = isActive
            ? isDarkMode
              ? "#f0c040"
              : "#d97706"
            : isDarkMode
              ? "#1e293b"
              : "#e2e8f0";
          btn.style.color = isActive
            ? isDarkMode
              ? "#0f172a"
              : "#ffffff"
            : isDarkMode
              ? "#94a3b8"
              : "#64748b";
        });
      }

      function applySort() {
        let filtered =
          currentFilter === "all"
            ? books.filter((b) => b.grade === currentGrade)
            : books.filter(
                (b) => b.cat === currentFilter && b.grade === currentGrade,
              );
        const searchTerm = document
          .getElementById("search-input")
          .value.toLowerCase();
        filtered = filtered.filter(
          (b) =>
            b.title.includes(searchTerm) ||
            b.desc.includes(searchTerm) ||
            b.cat.includes(searchTerm),
        );
        applyCurrentSort(filtered);
      }

      function applyCurrentSort(filtered) {
        if (currentSort === "name")
          filtered.sort((a, b) => a.title.localeCompare(b.title, "ar"));
        else if (currentSort === "newest")
          filtered.sort((a, b) => b.date - a.date);
        else if (currentSort === "popular")
          filtered.sort((a, b) => b.popular - a.popular);
        renderBooks(filtered);
      }

      function toggleTheme() {
        isDarkMode = !isDarkMode;
        const app = document.getElementById("app");
        const btn = document.getElementById("theme-toggle");
        if (isDarkMode) {
          app.style.backgroundColor = "#0f172a";
          btn.textContent = "🌙 وضع ليلي";
          btn.style.backgroundColor = "#1e293b";
          btn.style.color = "#f0c040";
        } else {
          app.style.backgroundColor = "#f8fafc";
          btn.textContent = "☀️ وضع نهاري";
