<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <style>
body{
    margin:0;
    background:#0f172a;
    font-family:"Cairo",sans-serif;
}

.maintenance-page{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    radial-gradient(circle at top,#1e293b,#0f172a 70%);

}

.maintenance-box{

    width:min(650px,90%);

    background:#1e293b;

    border:1px solid rgba(240,192,64,.25);

    border-radius:30px;

    padding:50px;

    text-align:center;

    box-shadow:0 25px 60px rgba(0,0,0,.45);

}

.maintenance-icon{

    font-size:80px;

    margin-bottom:20px;

}

.maintenance-box h1{

    color:#f0c040;

    font-size:42px;

    margin:0;

}

.maintenance-box p{

    color:#cbd5e1;

    line-height:2;

    margin:25px 0;

    font-size:19px;

}

.maintenance-loading{

    width:100%;

    height:12px;

    background:#0f172a;

    border-radius:999px;

    overflow:hidden;

    margin:35px 0;

}

.maintenance-progress{

    width:35%;

    height:100%;

    background:linear-gradient(90deg,#f0c040,#ffd54f,#f0c040);

    animation:loading 1.8s linear infinite;

}

@keyframes loading{

0%{
transform:translateX(-120%);
}

100%{
transform:translateX(350%);
}

}

.maintenance-note{

    color:#94a3b8;

    font-size:18px;

    margin-bottom:35px;

}

.maintenance-sponsor{

    border-top:1px solid rgba(240,192,64,.2);

    padding-top:25px;

}

.maintenance-sponsor span{

    color:#94a3b8;

}

.maintenance-sponsor h2{

    color:#f0c040;

    margin:10px 0;

    font-size:32px;

}

.maintenance-sponsor small{

    color:#cbd5e1;

    font-size:16px;

}
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>


    <button id="menuBtn" onclick="toggleMenu()">
    <i data-lucide="menu"></i>
</button>
  </head>


  <body class="h-full">
    

    
<div class="maintenance-page">

    <div class="maintenance-box">

        <div class="maintenance-icon">
            🔒
        </div>

        <h1>
            تم إغلاق المكتبة مؤقتًا
        </h1>

        <p>
            جاري تجهيز التحديثات القادمة وإضافة محتوى جديد
            لتحسين تجربة المستخدم.
        </p>

        <div class="maintenance-loading">
            <div class="maintenance-progress"></div>
        </div>

        <div class="maintenance-note">
            ⏳ سيتم إعادة فتح المكتبة قريبًا بإذن الله
        </div>

        <div class="maintenance-sponsor">
            <span>برعاية</span>

            <h2>
                محمد رمضان الحرباوي
            </h2>

            <small>
                تصميم وتطوير: مالك سامح
            </small>
        </div>

    </div>

</div>
  </body>
</html>
